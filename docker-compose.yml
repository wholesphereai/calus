# Run the whole Calus stack: detection proxy (:8000) + dashboard (:5173).
#
#   1. cp proxy/.env.example proxy/.env   # then add your provider keys + admin token
#   2. docker compose up --build
#   3. open http://localhost:5173  (paste the CALUS_ADMIN_TOKEN from proxy/.env)
#
# Detection-only: the proxy observes and flags traffic, never blocks or alters it.

services:
  proxy:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/wholesphereai/calus-proxy:latest
    ports:
      - "8000:8000"
    env_file:
      - path: proxy/.env
        required: false
    volumes:
      - calus-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=4).status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    image: ghcr.io/wholesphereai/calus-dashboard:latest
    ports:
      - "5173:80"
    depends_on:
      proxy:
        condition: service_healthy
    restart: unless-stopped

volumes:
  calus-data:
