server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers. Fonts are self-hosted (@fontsource) and the API is
    # same-origin (proxied below), so a tight CSP holds. For a split-origin
    # deploy (VITE_PROXY_URL set to another host), widen connect-src.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Content-Security-Policy "default-src 'self'; connect-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; font-src 'self'; script-src 'self'; base-uri 'self'; frame-ancestors 'none'" always;

    # Reverse-proxy the API to the proxy service so the SPA is same-origin
    # (no CORS, no baked host URL). 'proxy' is the compose service name.
    location /api/ {
        proxy_pass http://proxy:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /v1/ {
        proxy_pass http://proxy:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA: fall back to index.html for client-side routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # long-cache hashed assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
